services:
  dumb-mcp-multiplexer:
    image: ghcr.io/sand-head/dumb-mcp-multiplexer:latest
    container_name: dumb-mcp-multiplexer
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "0.0.0.0:7899:7899"
    volumes:
      - multiplexer_data:/data:Z
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

volumes:
  multiplexer_data:
