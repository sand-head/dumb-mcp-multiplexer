services:
  proxy:
    image: ghcr.io/sand-head/dumb-mcp-multiplexer:latest
    container_name: dumb-mcp-proxy
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "7899:7899"
    volumes:
      - proxy_data:/data:Z
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

volumes:
  proxy_data:
