services:
  proxy:
    image: ghcr.io/sand-head/dumb-mcp-multiplexer:latest
    container_name: dumb-mcp-multiplexer
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "0.0.0.0:7899:7899"
    volumes:
      - multiplexer_data:/data:Z
      # WARNING: Docker socket access grants container-management privileges on the host.
      # Do not mount this as :ro; stdio upstreams need write access to create/start/stop/remove containers.
      # Prefer Podman rootless + quadlet when possible.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONTAINER_SOCKET=/var/run/docker.sock
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

volumes:
  multiplexer_data:
  # Shared cache for stdio package runner upstreams (uvx, npx).
  # Persists downloaded packages across server restarts and between different package runner servers.
  dumb-mcp-runner-cache:
