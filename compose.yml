services:
  proxy:
    build:
      context: .
      target: runtime
    container_name: dumb-mcp-proxy
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "0.0.0.0:7899:7899"
    volumes:
      - proxy_data:/data:Z
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/data/proxy.db

volumes:
  proxy_data:
